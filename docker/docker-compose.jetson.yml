version: "3.9"

# Apply with: docker compose -f docker-compose.yml -f docker-compose.jetson.yml up -d
# Eliminates Docker NAT overhead (~1-2ms/request) by using host network mode (H-4).

services:
  ollama:
    runtime: nvidia
    network_mode: host
    ports: []                   # incompatible with host network mode
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - KEEP_ALIVE=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
